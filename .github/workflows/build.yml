name: Build Arch ISO

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        uses: 'docker://archlinux:latest'
        with:
          args: >-
            bash -c "
            pacman -Sy --noconfirm archiso &&
            mkdir -p /tmp/work /tmp/out &&
            mkarchiso -v -w /tmp/work -o /tmp/out /github/workspace
            "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: arch-iso
          path: /tmp/out/*.iso
          retention-days: 7
