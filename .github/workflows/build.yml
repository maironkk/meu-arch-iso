name: Build Arch ISO

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          mkdir -p ${{ github.workspace }}/out
          docker run --privileged --rm \
            -v ${{ github.workspace }}:/iso \
            -v ${{ github.workspace }}/out:/out \
            archlinux:latest \
            bash -c "
              pacman -Sy --noconfirm archiso &&
              mkdir -p /tmp/work &&
              mkarchiso -v -w /tmp/work -o /out /iso
            "

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: arch-iso
          path: ${{ github.workspace }}/out/*.iso
          retention-days: 7
